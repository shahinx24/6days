<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <div>
        <h1>Calculator</h1>
        <form>
            <input type="number" id="num1" placeholder="Enter a number">
            <button type="button" onclick="calculate('+')">+</button>
            <button type="button" onclick="calculate('-')">-</button>
            <button type="button" onclick="calculate('*')">*</button>
            <button type="button" onclick="calculate('/')">/</button>
            <button type="button" onclick="resetCount()">Reset</button>
            <p id="result">0</p>
        </form>
    </div>
    <script>
        let count = 0;
        const res = document.getElementById('result');

        function calculate(op) {
            const input = document.getElementById('num1');
            const value = parseFloat(input.value);

            if (isNaN(value)) {
                res.innerHTML = "Enter a Number";
                return;
            }

            switch (op) {
                case '+':
                    count += value;
                    break;
                case '-':
                    count -= value;
                    break;
                case '*':
                    count *= value;
                    break;
                case '/':
                    if (value === 0) {
                        res.innerHTML = "can't divide by zero";
                        return;
                    }
                    count /= value;
                    break;
                default:
                    res.innerHTML = "invalid opration"
                    return;
            }
            res.innerHTML = count;
            input.value = "";
        }
        function resetCount() {
            document.getElementById('num1').value = "";
            res.innerHTML = 0;
        }
    </script>
</body>

</html>
